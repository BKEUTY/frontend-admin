<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c2185b" />
    <title>BKEUTY - Đang Ngoại Tuyến</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fce4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            text-align: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(194, 24, 91, 0.1);
            max-width: 90%;
            width: 400px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            font-style: italic;
            color: #c2185b;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: #111;
        }

        .desc {
            font-size: 1rem;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            background-color: #c2185b;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">BKEUTY</div>
        <div class="title">Bạn đang offline</div>
        <div class="desc">Kết nối mạng của bạn hiện đang không có. Nhưng đừng lo, hãy kiểm tra lại kết nối Wi-Fi hoặc 4G
            và thử lại nhé!</div>
        <a href="/" class="btn" onclick="window.location.reload(); return false;">Thử Lại</a>
    </div>
</body>

</html>
